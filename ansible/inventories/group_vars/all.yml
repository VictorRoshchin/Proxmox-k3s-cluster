---
common_timezone: Asia/Yekaterinburg

common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - git
  - htop
  - jq
  - vim

common_extra_packages: []

kubernetes_kernel_modules:
  - overlay
  - br_netfilter

kubernetes_sysctl_settings:
  net.bridge.bridge-nf-call-iptables: "1"
  net.bridge.bridge-nf-call-ip6tables: "1"
  net.ipv4.ip_forward: "1"

k3s_install_url: https://get.k3s.io
k3s_api_port: 6443
k3s_local_artifacts_dir: "{{ playbook_dir }}/../artifacts"
k3s_local_kubeconfig_path: "{{ k3s_local_artifacts_dir }}/k3s.yaml"
