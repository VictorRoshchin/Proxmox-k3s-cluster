---
- name: Resolve master host
  ansible.builtin.set_fact:
    k3s_master_host: "{{ groups['k3s_master'][0] }}"

- name: Check whether k3s binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download official k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_binary.stat.exists

- name: Install k3s agent and join cluster
  ansible.builtin.command: /tmp/k3s-install.sh
  environment:
    K3S_URL: "https://{{ hostvars[k3s_master_host].ansible_host }}:{{ k3s_api_port }}"
    K3S_TOKEN: "{{ hostvars[k3s_master_host].k3s_cluster_token }}"
    INSTALL_K3S_EXEC: "{{ k3s_agent_install_exec }} --node-name {{ hostname | default(inventory_hostname) }}"
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists
  no_log: true

- name: Ensure k3s agent service is enabled and started
  ansible.builtin.service:
    name: "{{ k3s_agent_service_name }}"
    enabled: true
    state: started

