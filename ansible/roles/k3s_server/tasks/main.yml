---
- name: Check whether k3s binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download official k3s install script
  ansible.builtin.get_url:
    url: "{{ k3s_install_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_binary.stat.exists

- name: Install k3s server
  ansible.builtin.command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_EXEC: "{{ k3s_server_install_exec }} --node-name {{ hostname | default(inventory_hostname) }}"
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Ensure k3s service is enabled and started
  ansible.builtin.service:
    name: "{{ k3s_server_service_name }}"
    enabled: true
    state: started

- name: Wait for k3s API on localhost
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ k3s_api_port }}"
    timeout: 180

- name: Read k3s cluster token
  ansible.builtin.slurp:
    src: "{{ k3s_token_path }}"
  register: k3s_token_file
  no_log: true

- name: Store k3s cluster token as host fact
  ansible.builtin.set_fact:
    k3s_cluster_token: "{{ k3s_token_file.content | b64decode | trim }}"
    cacheable: true
  no_log: true

- name: Create local artifacts directory
  ansible.builtin.file:
    path: "{{ k3s_local_artifacts_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Fetch kubeconfig from master
  ansible.builtin.fetch:
    src: "{{ k3s_kubeconfig_path }}"
    dest: "{{ k3s_local_kubeconfig_path }}"
    flat: true

