---
- name: Prepare all nodes
  hosts: all
  become: true
  gather_facts: true
  roles:
    - common

- name: Install k3s server
  hosts: k3s_master
  become: true
  gather_facts: true
  roles:
    - k3s_server

- name: Wait for k3s API server
  hosts: k3s_master
  become: false
  gather_facts: false
  serial: 1
  tasks:
    - name: Wait for Kubernetes API port on master
      ansible.builtin.wait_for:
        host: "{{ hostvars[inventory_hostname].ansible_host }}"
        port: "{{ hostvars[inventory_hostname].k3s_api_port | default(6443) }}"
        timeout: 180
      delegate_to: localhost

- name: Install k3s agents
  hosts: k3s_workers
  become: true
  gather_facts: true
  serial: 1
  roles:
    - k3s_agent

- name: Verify k3s cluster
  hosts: k3s_master
  become: true
  gather_facts: false
  tasks:
    - name: Wait until all nodes are visible
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: k3s_nodes
      changed_when: false
      retries: 20
      delay: 6
      until:
        - k3s_nodes.rc == 0
        - (k3s_nodes.stdout_lines | select('search', ' Ready ') | list | length) >= (groups['all'] | length)

    - name: Show cluster nodes
      ansible.builtin.debug:
        msg: "{{ k3s_nodes.stdout_lines }}"
